<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Honeymoon Indonesia 2026 — Java, Bali, Komodo + ruta a Tokio" />
  <title>Honeymoon Indonesia 2026</title>
  <link rel="stylesheet" href="style.css" />

  <!-- PWA: manifest + icons + platform meta tags -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#B08C6B" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Mi Viaje" />
  <meta name="mobile-web-app-capable" content="yes" />
</head>
<body>

  <!-- ── Sticky top stack: banner + header + nav, as ONE sticky
       unit so they don't fight each other for position:sticky top:0 ── -->
  <div class="sticky-top-stack" id="stickyTopStack">

    <!-- ── Offline banner ──────────────────────────────────── -->
    <div class="offline-banner" id="offlineBanner" style="display:none">
      📡 Sin conexión — mostrando datos guardados
    </div>

    <!-- ── App Header ──────────────────────────────────────────
         Compact on every viewport now — no eyebrow/dates/city-chips.
         The trip hero photo below carries the visual weight instead. -->
    <header class="app-header">
      <div class="header-main-row">
        <div class="header-text-col">
          <h1 class="header-title" id="headerTitle">Honeymoon <em>Indonesia</em></h1>
        </div>
        <button class="mobile-menu-trigger" id="mobileMenuTrigger" aria-label="Abrir menú" aria-expanded="false">
          <span class="mobile-menu-trigger-bars"></span>
        </button>
      </div>
    </header>

    <!-- ── Trip Switcher (desktop) ───────────────────────────── -->
    <nav class="trip-switcher" aria-label="Selector de viaje">
      <div class="trip-switcher-inner" id="tripSwitcherInner"></div>
    </nav>

    <!-- ── Destination Tabs (desktop) ────────────────────────── -->
    <nav class="dest-tabs" aria-label="Navegación por destino">
      <div class="dest-tabs-inner" id="destTabsInner"></div>
    </nav>

    <!-- ── Global "download all" row (both desktop + mobile) ─── -->
    <div class="global-download-row" id="globalDownloadRow"></div>
  </div>

  <!-- ── Trip hero photo ───────────────────────────────────────
       Scrolls away normally (NOT part of the sticky stack above) so
       it never affects the compact mobile sticky-header fix. Hidden
       entirely if the selected trip has no photoUrl. -->
  <div class="trip-hero" id="tripHero" style="display:none">
    <img id="tripHeroImg" alt="" loading="lazy" />
    <div class="trip-hero-overlay"></div>
  </div>

  <!-- ── Mobile hierarchical menu (hamburger) ─────────────────
       Hidden on desktop via CSS; replaces the trip-switcher +
       dest-tabs carousel on narrow viewports. -->
  <div class="mobile-menu-overlay" id="mobileMenuOverlay">
    <div class="mobile-menu-panel" id="mobileMenuPanel" role="dialog" aria-modal="true" aria-label="Menú de navegación">
      <div class="mobile-menu-header">
        <span class="mobile-menu-title">📋 Menú</span>
        <button class="mobile-menu-close" id="mobileMenuClose" aria-label="Cerrar menú">✕</button>
      </div>
      <div class="mobile-menu-trips" id="mobileMenuTrips"></div>
    </div>
  </div>

  <!-- ── Tab panels (one per destination + Resumen) ────────── -->
  <div id="tabPanels">
    <div class="loading">Cargando itinerario…</div>
  </div>

  <!-- ── App Footer ──────────────────────────────────────── -->
  <footer class="app-footer">
    <p>¡Feliz luna de miel! 💍<span class="footer-divider">·</span>Agosto 2026</p>
  </footer>

  <!-- ── Modal ───────────────────────────────────────────── -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-card" id="modalCard">
      <div class="modal-header">
        <div class="modal-title-area">
          <div class="modal-type-badge" id="modalTypeBadge"></div>
          <h2 class="modal-title" id="modalTitle"></h2>
          <div class="modal-time-city" id="modalTimecity"></div>
        </div>
        <button class="modal-close-btn" id="modalClose" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-description" id="modalDescription"></div>
      </div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <!-- ── PDF viewer overlay ──────────────────────────────────
       Renders fetched PDFs inline via an iframe instead of a new
       browser tab — modern Chrome blocks navigating a separate
       tab/window to a blob: URL created in another context, so a
       same-document iframe is the reliable way to show a fetched
       PDF (and it works the same whether served fresh or from the
       service worker's offline cache). -->
  <div class="modal-overlay" id="pdfViewerOverlay" role="dialog" aria-modal="true" aria-label="Documento PDF">
    <div class="modal-card pdf-viewer-card">
      <div class="modal-header">
        <div class="modal-title-area">
          <h2 class="modal-title">📄 Documento</h2>
        </div>
        <button class="modal-close-btn" id="pdfViewerClose" aria-label="Cerrar">✕</button>
      </div>
      <div class="pdf-viewer-body">
        <iframe id="pdfViewerFrame" title="Documento PDF"></iframe>
      </div>
    </div>
  </div>

  <!-- ── Map info bottom sheet ────────────────────────────────
       Fixed to the viewport (NOT positioned relative to whatever
       district/region was tapped) so it's always fully visible no
       matter where on the map — or how far down the page — the user
       tapped. -->
  <div class="map-sheet-backdrop" id="mapSheetBackdrop"></div>
  <div class="map-sheet" id="mapSheet" role="dialog" aria-modal="true" aria-label="Información del mapa">
    <div class="map-sheet-handle"></div>
    <button class="map-sheet-close" id="mapSheetClose" aria-label="Cerrar">✕</button>
    <div id="mapSheetBody"></div>
  </div>

  <!-- ── App (ES Module) ─────────────────────────────────── -->
  <script type="module">
    import firebaseConfig from './firebase-config.js';
    import {
      TYPE_LABELS, DESTINATIONS_BY_TRIP, ACCOM_CITY_MAP_BY_TRIP, TOUR_CITY_MAP_BY_TRIP,
      JAPAN_CATEGORIES, JAPAN_SUBCATEGORY_ORDER, TOKYO_DISTRICT_SUMMARIES, JAPAN_SUBCATEGORY_NOTES
    } from './data.js';
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import {
      initializeFirestore, persistentLocalCache, persistentSingleTabManager,
      collection, onSnapshot, updateDoc, doc
    } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    // ── Init Firebase ───────────────────────────────────────
    // persistentLocalCache turns on Firestore's built-in IndexedDB
    // offline persistence: every doc read while online is cached
    // locally, onSnapshot listeners keep serving that cache (no error
    // state) when offline, and writes/reads resync automatically once
    // connectivity returns. This is what makes activities/flights/
    // accommodations/tours/dayNotes/japanItems available offline —
    // no manual caching of Firestore traffic needed in sw.js.
    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, {
      localCache: persistentLocalCache({ tabManager: persistentSingleTabManager({}) })
    });

    // ── PWA: service worker + offline banner ─────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch((err) => {
          console.warn('Service worker registration failed:', err);
        });
      });
    }

    function updateOfflineBanner() {
      const banner = document.getElementById('offlineBanner');
      if (banner) banner.style.display = navigator.onLine ? 'none' : 'block';
    }
    window.addEventListener('online', updateOfflineBanner);
    window.addEventListener('offline', updateOfflineBanner);
    updateOfflineBanner();

    // Belt-and-suspenders on top of the CSS media query: explicitly force
    // the desktop pill-tab nav rows hidden on mobile widths and the
    // hamburger trigger shown, so there's no possible state where both
    // navs render at once even if a stale CSS file is somehow served.
    function enforceMobileNavLayout() {
      const isMobile = window.matchMedia('(max-width: 640px)').matches;
      document.querySelector('.trip-switcher')?.style.setProperty('display', isMobile ? 'none' : '', isMobile ? 'important' : '');
      document.querySelector('.dest-tabs')?.style.setProperty('display', isMobile ? 'none' : '', isMobile ? 'important' : '');
      document.getElementById('mobileMenuTrigger')?.style.setProperty('display', isMobile ? 'flex' : 'none', 'important');
    }
    window.addEventListener('resize', enforceMobileNavLayout);
    enforceMobileNavLayout();

    // Storage PDF links are intercepted (rather than navigated to
    // directly) so the fetch goes through the service worker, which
    // caches the response on first view — making a ticket once opened
    // available offline afterward. Maps/TikTok links are untouched.
    let activePdfBlobUrl = null;

    // Just fetches (and lets the service worker cache it) without
    // displaying anything — shared by openPdf() and the bulk
    // "Descargar todo para offline" buttons.
    async function cachePdf(url) {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error('PDF fetch failed: ' + resp.status);
      return resp;
    }

    async function openPdf(url) {
      const pdfOverlay = document.getElementById('pdfViewerOverlay');
      const pdfFrame = document.getElementById('pdfViewerFrame');
      try {
        const resp = await cachePdf(url);
        const blob = await resp.blob();
        if (activePdfBlobUrl) URL.revokeObjectURL(activePdfBlobUrl);
        activePdfBlobUrl = URL.createObjectURL(blob);
        pdfFrame.src = activePdfBlobUrl;
        pdfOverlay.classList.add('open');
      } catch (err) {
        alert('No se pudo abrir el documento. Si no tienes conexión, ábrelo primero con internet para guardarlo sin conexión.');
      }
    }

    // Sequentially caches every URL, reporting progress via onProgress(done,
    // total) after each one (including failures, which are just skipped —
    // a single bad/offline PDF shouldn't abort the whole batch).
    async function cacheAllPdfs(urls, onProgress) {
      let done = 0;
      for (const url of urls) {
        try { await cachePdf(url); } catch (err) { console.warn('No se pudo cachear PDF:', url, err); }
        done++;
        onProgress(done, urls.length);
      }
    }

    function collectPdfUrls(items) {
      return [...new Set(items.map(i => i.pdfUrl).filter(Boolean))];
    }

    // Reusable "📥 Descargar todo para offline" button. `getUrls` is called
    // at click time (not render time) so it always reflects current data.
    function renderDownloadAllButton(getUrls, variant, label) {
      const wrap = document.createElement('div');
      wrap.className = 'download-all-wrap' + (variant === 'global' ? ' download-all-global' : '');

      const defaultLabel = label || '📥 Descargar todo para offline';
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'download-all-btn';
      btn.textContent = defaultLabel;

      const progress = document.createElement('span');
      progress.className = 'download-all-progress';
      progress.style.display = 'none';

      btn.addEventListener('click', async () => {
        const urls = getUrls();
        if (!urls.length) {
          btn.textContent = '✓ Sin documentos para descargar';
          setTimeout(() => { btn.textContent = defaultLabel; }, 2000);
          return;
        }
        btn.disabled = true;
        btn.style.display = 'none';
        progress.style.display = '';
        await cacheAllPdfs(urls, (done, total) => {
          progress.textContent = `⏳ ${done}/${total} documentos descargados`;
        });
        progress.textContent = `✓ ${urls.length}/${urls.length} documentos guardados sin conexión`;
        setTimeout(() => {
          progress.style.display = 'none';
          btn.textContent = defaultLabel;
          btn.style.display = '';
          btn.disabled = false;
        }, 2500);
      });

      wrap.appendChild(btn);
      wrap.appendChild(progress);
      return wrap;
    }
    document.getElementById('pdfViewerClose').addEventListener('click', () => {
      document.getElementById('pdfViewerOverlay').classList.remove('open');
      document.getElementById('pdfViewerFrame').src = 'about:blank';
    });
    document.getElementById('pdfViewerOverlay').addEventListener('click', (e) => {
      if (e.target.id === 'pdfViewerOverlay') {
        e.currentTarget.classList.remove('open');
        document.getElementById('pdfViewerFrame').src = 'about:blank';
      }
    });

    document.getElementById('mapSheetClose').addEventListener('click', dismissMapSheet);
    document.getElementById('mapSheetBackdrop').addEventListener('click', dismissMapSheet);
    document.addEventListener('click', (e) => {
      const link = e.target.closest('a[href*="firebasestorage.googleapis.com"]');
      if (!link) return;
      e.preventDefault();
      openPdf(link.href);
    });

    // ── State ───────────────────────────────────────────────
    let currentActivities = [];
    let currentFlights = [];
    let currentAccommodations = [];
    let currentTours = [];
    let currentDayNotesRaw = [];
    let currentJapanItems = [];
    let trips = [];
    let selectedTripId = 'honeymoon-indonesia';
    let currentOpenId = null;
    let tabsBuiltForTrip = null;
    let currentTabKeys = ['overview'];
    const filterStateByCategory = {}; // category name -> { rating: 'todos'|'alto'|'medio'|'bajo', price: 'todos'|'eco'|'medio'|'caro' }
    const RATING_TIERS = {
      todos: () => true,
      alto:  (r) => r != null && r >= 4,
      medio: (r) => r != null && r >= 3 && r <= 4,
      bajo:  (r) => r != null && r <= 2
    };
    const PRICE_TIERS = {
      todos: () => true,
      eco:   (p) => p === '¥',
      medio: (p) => p === '¥¥',
      caro:  (p) => p === '¥¥¥'
    };
    let tokioSubView = 'resumen'; // "Tokio por Distrito" sub-tab: 'resumen' | 'mapa'
    let regionsSubView = 'lista'; // "Fuera de Tokio (Japón)" sub-tab: 'lista' | 'mapa'

    // ── Single reactive header photo ────────────────────────────
    // There is exactly ONE header photo element (#tripHero) on the page.
    // What it shows is recomputed every time the view changes — trip,
    // tab/destination/category, or (for Tokio por Distrito) the
    // currently-expanded subcategory — instead of stacking a second,
    // separate "destination photo" inside the page content.
    let activeSubcatPhoto = null; // set/cleared when a subcat block expands/collapses

    // Tokio por Distrito's subcategory names are the same Tokyo district
    // names already carrying a `photo` in TOKYO_DISTRICT_SUMMARIES.
    const subcatPhotoByName = {};
    TOKYO_DISTRICT_SUMMARIES.forEach(d => { if (d.photo) subcatPhotoByName[d.name] = d.photo; });

    // One representative photo per Japón category, shown when no more
    // specific subcategory photo is active.
    const JAPAN_CATEGORY_PHOTOS = {
      'Tokio por Distrito': 'https://images.unsplash.com/photo-1532274804934-6572ef1581e9?q=80&w=1600&auto=format&fit=crop',
      'Fuera de Tokio (Japón)': 'https://images.unsplash.com/photo-1774401486461-e0b0dbff15fc?q=80&w=1600&auto=format&fit=crop',
      'Restaurantes y Comida': 'https://images.unsplash.com/photo-1591325418441-ff678baf78ef?q=80&w=1600&auto=format&fit=crop',
      'Naturaleza': 'https://images.unsplash.com/photo-1573623034802-50c359f8cfd2?q=80&w=1600&auto=format&fit=crop',
      'Hidden Gems': 'https://images.unsplash.com/photo-1705657309606-ed54eec830fd?q=80&w=1600&auto=format&fit=crop',
      'Actividades y Experiencias': 'https://images.unsplash.com/photo-1765035058192-edd7ee3e0df0?q=80&w=1600&auto=format&fit=crop',
      'Eventos Estacionales': 'https://images.unsplash.com/photo-1760445934203-8478d8927ce1?q=80&w=1600&auto=format&fit=crop'
    };

    function getActiveTabKey() {
      return document.querySelector('.day-nav-city.active')?.dataset.tabKey
        || document.querySelector('.mobile-menu-item-btn.active')?.dataset.tabKey
        || currentTabKeys[0];
    }

    function resolveViewHeroPhoto() {
      const trip = trips.find(t => t.id === selectedTripId);
      if (!trip) return null;
      const activeKey = getActiveTabKey();

      if (isCategoriesTrip(selectedTripId)) {
        if (activeSubcatPhoto) return activeSubcatPhoto;
        return JAPAN_CATEGORY_PHOTOS[activeKey] || trip.photoUrl || null;
      }

      if (!activeKey || activeKey === 'overview') return trip.photoUrl || null;
      const destinations = DESTINATIONS_BY_TRIP[selectedTripId] || {};
      return destinations[activeKey]?.photo || trip.photoUrl || null;
    }

    function updateViewHero() {
      const heroEl = document.getElementById('tripHero');
      const heroImg = document.getElementById('tripHeroImg');
      if (!heroEl || !heroImg) return;
      const url = resolveViewHeroPhoto();
      if (url) {
        if (heroImg.getAttribute('src') !== url) {
          heroImg.src = url;
          heroImg.alt = getActiveTabKey() || '';
        }
        heroEl.style.display = '';
      } else {
        heroEl.style.display = 'none';
      }
    }

    // Japan-wide map regions — same simplified, non-cartographic illustrated
    // style as the Tokyo map. `target` is the subcategory each shape jumps
    // to (it doesn't always match the shape's display name 1:1, since
    // thematic subcats like "Esquí"/"Buceo" cut across several regions).
    const JAPAN_MAP_REGIONS = [
      { name: 'Hokkaido',      target: 'Hokkaido',                  emoji: '🦑', x: 150, y: 20,  w: 120, h: 60, travel: '~1.5h vuelo / 4h tren+ferry', teaser: 'Sapporo, Niseko (esquí) y Hakodate están aquí.' },
      { name: 'Tohoku',        target: 'Fuera de lo común',         emoji: '🏔️', x: 150, y: 100, w: 120, h: 55, travel: '~1.5h shinkansen (Sendai)', teaser: 'Región menos visitada — Matsushima Bay, Ginzan Onsen.' },
      { name: 'Alpes/Chubu',   target: 'Kanazawa-Toyama-Nagano-Matsumoto', emoji: '⛩️', x: 150, y: 175, w: 120, h: 55, travel: '~2.5h shinkansen (Nagano)', teaser: 'Kanazawa, Matsumoto, y esquí en Hakuba/Nozawa/Myoko.' },
      { name: 'Kanto (cerca de Tokio)', target: 'Cerca de Tokio',   emoji: '🏞️', x: 280, y: 175, w: 110, h: 55, travel: '0-2h (día)', teaser: 'Nikko, Kamakura, Hakone, Kawagoe — day trips desde Tokio.' },
      { name: 'Monte Fuji',    target: 'Monte Fuji',                emoji: '🗻', x: 280, y: 250, w: 110, h: 50, travel: '~2h bus/tren', teaser: 'El Monte Fuji y sus pueblos del lago.' },
      { name: 'Izu Peninsula', target: 'Buceo',                     emoji: '🤿', x: 280, y: 320, w: 110, h: 50, travel: '~2-3h tren', teaser: 'La opción de buceo más cercana a Tokio.' },
      { name: 'Kobe/Himeji/Okayama', target: 'Kobe-Himeji-Okayama', emoji: '🏯', x: 20,  y: 320, w: 100, h: 50, travel: '~3h shinkansen', teaser: 'Kobe beef, Himeji Castle, Kurashiki.' },
      { name: 'Kioto',         target: 'Kioto',                     emoji: '🏯', x: 130, y: 320, w: 100, h: 50, travel: '~2h15 shinkansen', teaser: 'Templos, Fushimi Inari, Arashiyama.' },
      { name: 'Koyasan/Nara',  target: 'Koyasan-Nara',              emoji: '🛕', x: 130, y: 390, w: 100, h: 50, travel: '~3h shinkansen+tren', teaser: 'Todaiji, Okunoin, ciervos de Nara.' },
      { name: 'Osaka',         target: 'Osaka',                     emoji: '🐙', x: 20,  y: 390, w: 100, h: 50, travel: '~2h30 shinkansen', teaser: 'Dotonbori, takoyaki, vida nocturna.' },
      { name: 'Naoshima',      target: 'Fuera de lo común',         emoji: '🎨', x: 20,  y: 460, w: 90,  h: 45, travel: '~4h shinkansen+ferry', teaser: '"Isla del Arte" — Kusama, Tadao Ando.' },
      { name: 'Hiroshima/Miyajima', target: 'Hiroshima-Miyajima',   emoji: '⛩️', x: 130, y: 460, w: 100, h: 50, travel: '~4h shinkansen', teaser: 'Memorial de la Paz, santuario flotante de Miyajima.' },
      { name: 'Shikoku',       target: 'Fuera de lo común',         emoji: '🌉', x: 130, y: 530, w: 100, h: 55, travel: '~4-5h (tren+bus, requiere auto en Iya)', teaser: 'Valle de Iya — puente de enredaderas, remoto.' },
      { name: 'Kyushu',        target: 'Kyushu',                    emoji: '🍜', x: 20,  y: 530, w: 100, h: 60, travel: '~5h shinkansen / 2h vuelo', teaser: 'Fukuoka, onsen de Beppu/Kurokawa, Yakushima.' },
      { name: 'Okinawa',       target: 'Okinawa',                   emoji: '🏖️', x: 150, y: 650, w: 120, h: 55, travel: '~3h vuelo', teaser: 'Playas, Shuri Castle, y buceo con mantarrayas en Ishigaki.' }
    ];
    const JAPAN_MAP_COLORS = {
      'Hokkaido': '#BAE6FD', 'Tohoku': '#A7F3D0', 'Alpes/Chubu': '#FED7AA',
      'Kanto (cerca de Tokio)': '#FCA5A5', 'Monte Fuji': '#DDD6FE', 'Izu Peninsula': '#7DD3FC',
      'Kobe/Himeji/Okayama': '#99F6E4', 'Kioto': '#FBCFE8', 'Koyasan/Nara': '#FDE68A',
      'Osaka': '#FEF08A', 'Naoshima': '#F0ABFC', 'Hiroshima/Miyajima': '#C4B5FD',
      'Shikoku': '#86EFAC', 'Kyushu': '#FDA4AF', 'Okinawa': '#93C5FD'
    };

    // Rough relative-position layout for the illustrated Tokyo map — not
    // cartographically accurate, just clear compass-ish placement for a
    // quick-glance navigational aid. Names must match item.subcategory
    // values (for click-to-navigate) and TOKYO_DISTRICT_SUMMARIES.name
    // (for the hover/tap teaser).
    const TOKIO_MAP_SHAPES = [
      { name: 'Ikebukuro',     x: 130, y: 20,  w: 95,  h: 55 },
      { name: 'Yanaka',        x: 235, y: 10,  w: 80,  h: 50 },
      { name: 'Ueno',          x: 325, y: 12,  w: 85,  h: 50 },
      { name: 'Asakusa',       x: 420, y: 50,  w: 85,  h: 55 },
      { name: 'Kichijoji',     x: 10,  y: 70,  w: 85,  h: 50 },
      { name: 'Akihabara',     x: 370, y: 122, w: 90,  h: 50 },
      { name: 'Shimokitazawa', x: 10,  y: 150, w: 100, h: 50 },
      { name: 'Shinjuku',      x: 130, y: 140, w: 100, h: 55 },
      { name: 'Chiyoda',       x: 260, y: 185, w: 100, h: 55 },
      { name: 'Ginza',         x: 400, y: 205, w: 90,  h: 55 },
      { name: 'Harajuku',      x: 150, y: 232, w: 95,  h: 50 },
      { name: 'Daikanyama',    x: 40,  y: 240, w: 85,  h: 50 },
      { name: 'Shiba',         x: 280, y: 300, w: 90,  h: 50 },
      { name: 'Sangenjaya',    x: 30,  y: 310, w: 85,  h: 50 },
      { name: 'Shibuya',       x: 160, y: 295, w: 95,  h: 55 },
      { name: 'Odaiba',        x: 400, y: 345, w: 95,  h: 55 },
      { name: 'Mita',          x: 200, y: 365, w: 85,  h: 50 },
      { name: 'Nakameguro',    x: 40,  y: 375, w: 85,  h: 50 },
      { name: 'Jiyugaoka',     x: 40,  y: 445, w: 85,  h: 50 }
    ];
    const TOKIO_MAP_COLORS = {
      Ikebukuro: '#FDE68A', Ueno: '#BAE6FD', Asakusa: '#FBCFE8', Akihabara: '#DDD6FE',
      Shinjuku: '#FCA5A5', Chiyoda: '#FED7AA', Ginza: '#FEF08A', Harajuku: '#A7F3D0',
      Shibuya: '#99F6E4', Odaiba: '#93C5FD',
      Yanaka: '#E5E0D8', Shimokitazawa: '#F0ABFC', Kichijoji: '#86EFAC',
      Daikanyama: '#A5B4FC', Nakameguro: '#F9A8D4', Sangenjaya: '#D4D4D8',
      Jiyugaoka: '#FDA4AF', Shiba: '#FCD34D', Mita: '#C4B5FD'
    };

    function starsHtml(rating) {
      if (!rating) return '';
      const r = Math.max(1, Math.min(5, rating));
      return `<span class="japan-item-stars">${'⭐'.repeat(r)}${'☆'.repeat(5 - r)}</span>`;
    }

    function slugify(str) {
      return str.toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    }
    function tabSlug(key) { return key === 'overview' ? 'overview' : slugify(key); }

    const CATEGORY_ICONS = {
      "Tokio por Distrito": "🗼",
      "Fuera de Tokio (Japón)": "🚄",
      "Restaurantes y Comida": "🍜",
      "Naturaleza": "🌲",
      "Hidden Gems": "💎",
      "Actividades y Experiencias": "🎟️",
      "Eventos Estacionales": "🎏",
      "Otros Países (Asia)": "🌏"
    };

    function isCategoriesTrip(tripId) {
      const trip = trips.find(t => t.id === tripId);
      return !!trip && trip.viewMode === 'categories';
    }

    // Trips with viewMode "categories" (e.g. Japón) get one tab per
    // category, no Resumen tab. Trips with a destinations mapping
    // (itinerary-mode trips that have real content, like honeymoon/boda)
    // get a per-destination tab breakdown. Anything else (empty, or
    // categories-mode before "trips" has loaded) gets a single Resumen tab.
    function tabKeysForTrip(tripId) {
      if (isCategoriesTrip(tripId)) return [...JAPAN_CATEGORIES];
      const destinations = DESTINATIONS_BY_TRIP[tripId];
      return destinations ? ['overview', ...Object.keys(destinations)] : ['overview'];
    }

    // Shared between the desktop tab bar and the mobile hierarchical menu.
    function labelForTabKey(tripId, key) {
      if (isCategoriesTrip(tripId)) return (CATEGORY_ICONS[key] || '📌') + ' ' + key;
      if (key === 'overview') return '📋 Resumen';
      const destinations = DESTINATIONS_BY_TRIP[tripId] || {};
      return destinations[key] ? destinations[key].emoji + ' ' + key : key;
    }

    // ── Build tab bar (re-run whenever the selected trip changes) ──
    function buildTabs(tripId) {
      currentTabKeys = tabKeysForTrip(tripId);
      const nav = document.getElementById('destTabsInner');
      nav.innerHTML = '';
      currentTabKeys.forEach(key => {
        const btn = document.createElement('button');
        btn.className = 'day-nav-city';
        btn.dataset.tabKey = key;
        btn.textContent = labelForTabKey(tripId, key);
        btn.addEventListener('click', () => setActiveTab(key));
        nav.appendChild(btn);
      });

      const panels = document.getElementById('tabPanels');
      panels.innerHTML = '';
      currentTabKeys.forEach(key => {
        const panel = document.createElement('div');
        panel.className = 'dest-tab-panel';
        panel.id = 'tabPanel-' + tabSlug(key);
        panel.style.display = 'none';
        panels.appendChild(panel);
      });
      tabsBuiltForTrip = tripId;
      buildMobileMenu();
      renderGlobalDownloadRow();
    }

    function setActiveTab(key) {
      document.querySelectorAll('.day-nav-city').forEach(btn =>
        btn.classList.toggle('active', btn.dataset.tabKey === key)
      );
      document.querySelectorAll('.mobile-menu-item-btn').forEach(btn =>
        btn.classList.toggle('active', btn.dataset.tabKey === key)
      );
      currentTabKeys.forEach(k => {
        const panel = document.getElementById('tabPanel-' + tabSlug(k));
        if (panel) panel.style.display = (k === key) ? 'block' : 'none';
      });
      activeSubcatPhoto = null; // leaving whatever subcategory was expanded
      updateViewHero();
      window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
    }

    // ── Trip switcher (desktop tab bar) ────────────────────────
    const TRIP_TYPE_ICONS = { honeymoon: '💍', wedding: '💒', ideas: '🎌' };
    const TRIP_ORDER = { 'honeymoon-indonesia': 0, 'boda-mexico': 1, 'japon': 2 };

    function sortedTrips() {
      return [...trips].sort((a, b) => (TRIP_ORDER[a.id] ?? 99) - (TRIP_ORDER[b.id] ?? 99));
    }

    function buildTripSwitcher() {
      const nav = document.getElementById('tripSwitcherInner');
      nav.innerHTML = '';
      sortedTrips().forEach(trip => {
        const btn = document.createElement('button');
        btn.className = 'trip-switcher-btn' + (trip.id === selectedTripId ? ' active' : '');
        btn.dataset.tripId = trip.id;
        btn.textContent = (TRIP_TYPE_ICONS[trip.type] || '🧳') + ' ' + trip.name;
        btn.addEventListener('click', () => selectTrip(trip.id));
        nav.appendChild(btn);
      });
      buildMobileMenu();
    }

    function selectTrip(tripId) {
      if (tripId === selectedTripId) return;
      selectedTripId = tripId;
      document.querySelectorAll('.trip-switcher-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.tripId === tripId)
      );
      const trip = trips.find(t => t.id === tripId);
      if (trip) updateHeaderForTrip(trip);
      renderAll();
      buildMobileMenu();
      closeMobileMenu();
    }

    // ── Mobile hierarchical menu (hamburger) ───────────────────
    // Trip name -> tab/category list, each a vertical accordion, replacing
    // the horizontal-scroll tab carousel on narrow viewports. Reuses
    // selectTrip()/setActiveTab() so behavior stays identical to desktop.
    function buildMobileMenu() {
      const wrap = document.getElementById('mobileMenuTrips');
      if (!wrap) return;
      wrap.innerHTML = '';
      sortedTrips().forEach(trip => {
        const isSelected = trip.id === selectedTripId;

        const tripBtn = document.createElement('button');
        tripBtn.type = 'button';
        tripBtn.className = 'mobile-menu-trip-btn' + (isSelected ? ' expanded' : '');
        tripBtn.innerHTML =
          `<span>${TRIP_TYPE_ICONS[trip.type] || '🧳'} ${escHtml(trip.name)}</span>` +
          `<span class="mobile-menu-chevron">›</span>`;

        const sublist = document.createElement('div');
        sublist.className = 'mobile-menu-sublist';
        sublist.style.display = isSelected ? 'flex' : 'none';

        tabKeysForTrip(trip.id).forEach(key => {
          const itemBtn = document.createElement('button');
          itemBtn.type = 'button';
          itemBtn.className = 'mobile-menu-item-btn';
          itemBtn.dataset.tabKey = key;
          itemBtn.textContent = labelForTabKey(trip.id, key);
          itemBtn.addEventListener('click', () => {
            if (trip.id !== selectedTripId) selectTrip(trip.id);
            setActiveTab(key);
            closeMobileMenu();
          });
          sublist.appendChild(itemBtn);
        });

        tripBtn.addEventListener('click', () => {
          const opening = sublist.style.display === 'none';
          wrap.querySelectorAll('.mobile-menu-sublist').forEach(s => { s.style.display = 'none'; });
          wrap.querySelectorAll('.mobile-menu-trip-btn').forEach(b => b.classList.remove('expanded'));
          if (opening) { sublist.style.display = 'flex'; tripBtn.classList.add('expanded'); }
        });

        wrap.appendChild(tripBtn);
        wrap.appendChild(sublist);
      });

      // Mirror the currently-active tab's highlight into the freshly-built menu.
      const activeKey = document.querySelector('.day-nav-city.active')?.dataset.tabKey;
      if (activeKey) {
        wrap.querySelectorAll('.mobile-menu-item-btn').forEach(btn =>
          btn.classList.toggle('active', btn.dataset.tabKey === activeKey)
        );
      }
    }

    function openMobileMenu() {
      document.getElementById('mobileMenuOverlay').classList.add('open');
      document.getElementById('mobileMenuTrigger').setAttribute('aria-expanded', 'true');
    }
    function closeMobileMenu() {
      document.getElementById('mobileMenuOverlay').classList.remove('open');
      document.getElementById('mobileMenuTrigger').setAttribute('aria-expanded', 'false');
    }
    document.getElementById('mobileMenuTrigger').addEventListener('click', openMobileMenu);
    document.getElementById('mobileMenuClose').addEventListener('click', closeMobileMenu);
    document.getElementById('mobileMenuOverlay').addEventListener('click', (e) => {
      if (e.target.id === 'mobileMenuOverlay') closeMobileMenu();
    });

    // ── Global per-trip "download all" row ─────────────────────
    function renderGlobalDownloadRow() {
      const row = document.getElementById('globalDownloadRow');
      if (!row) return;
      row.innerHTML = '';
      const trip = trips.find(t => t.id === selectedTripId);
      const tripName = trip ? trip.name : 'este viaje';
      const getUrls = () => {
        const tid = selectedTripId;
        const all = [
          ...currentActivities.filter(a => a.tripId === tid),
          ...currentFlights.filter(f => f.tripId === tid),
          ...currentAccommodations.filter(a => a.tripId === tid),
          ...currentTours.filter(t => t.tripId === tid),
          ...currentJapanItems.filter(i => i.tripId === tid)
        ];
        return collectPdfUrls(all);
      };
      row.appendChild(renderDownloadAllButton(getUrls, 'global', `📥 Descargar todo de ${tripName} para offline`));
    }

    function updateHeaderForTrip(trip) {
      const titleEl = document.getElementById('headerTitle');
      if (trip.id === 'honeymoon-indonesia') {
        titleEl.innerHTML = 'Honeymoon <em>Indonesia</em>';
      } else {
        // Same script-font accent treatment as the Honeymoon header, just
        // applied to the whole (short) trip name for Boda/Japón.
        titleEl.innerHTML = `<em>${escHtml(trip.name)}</em>`;
      }

      document.body.classList.toggle('trip-theme-japon', trip.id === 'japon');
      updateViewHero(); // trip changed -> recompute which photo the single header image should show
    }

    // ── Firestore real-time listeners ────────────────────────
    onSnapshot(
      collection(db, 'activities'),
      (snapshot) => {
        const fresh = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        fresh.sort((a, b) =>
          a.day !== b.day ? a.day - b.day : (a.order ?? 99) - (b.order ?? 99)
        );
        currentActivities = fresh;
        renderAll();
        if (currentOpenId) {
          const act = fresh.find(a => a.id === currentOpenId);
          if (act) refreshModalDoneBtn(act);
        }
      },
      (error) => {
        console.error('Firestore error:', error);
        document.getElementById('tabPanels').innerHTML =
          '<p style="text-align:center;padding:48px 20px;color:#888;font-size:18px">' +
          'Error al cargar el itinerario. Comprueba tu conexión y recarga la página.</p>';
      }
    );

    onSnapshot(collection(db, 'flights'), (snapshot) => {
      currentFlights = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      currentFlights.sort((a, b) => (a.departureDate||'').localeCompare(b.departureDate||'') || (a.departureTime||'').localeCompare(b.departureTime||''));
      renderAll();
    }, (error) => console.error('Firestore error (flights):', error));

    onSnapshot(collection(db, 'accommodations'), (snapshot) => {
      currentAccommodations = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderAll();
    }, (error) => console.error('Firestore error (accommodations):', error));

    onSnapshot(collection(db, 'tours'), (snapshot) => {
      currentTours = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderAll();
    }, (error) => console.error('Firestore error (tours):', error));

    onSnapshot(collection(db, 'dayNotes'), (snapshot) => {
      currentDayNotesRaw = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderAll();
    }, (error) => console.error('Firestore error (dayNotes):', error));

    onSnapshot(collection(db, 'trips'), (snapshot) => {
      trips = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      buildTripSwitcher();
      const trip = trips.find(t => t.id === selectedTripId);
      if (trip) updateHeaderForTrip(trip);
      // viewMode (itinerary vs categories) is only known once trips has
      // loaded — force a tab rebuild in case an earlier renderAll() ran
      // before this and guessed wrong.
      tabsBuiltForTrip = null;
      renderAll();
    }, (error) => console.error('Firestore error (trips):', error));

    onSnapshot(collection(db, 'japanItems'), (snapshot) => {
      currentJapanItems = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderAll();
    }, (error) => console.error('Firestore error (japanItems):', error));

    // ── City helper ─────────────────────────────────────────
    function getCityForDay(day, destinations) {
      for (const [name, info] of Object.entries(destinations)) {
        if (info.days.includes(day)) return { name, info };
      }
      return { name: 'Otro destino', info: { emoji: '🌍', color: '#6B7280', days: [] } };
    }

    // ── Render everything into tab panels ────────────────────
    function renderAll() {
      if (tabsBuiltForTrip !== selectedTripId) {
        buildTabs(selectedTripId);
        setActiveTab(currentTabKeys[0]);
      }

      if (isCategoriesTrip(selectedTripId)) {
        renderCategoriesView();
        return;
      }

      const tripActivities = currentActivities.filter(a => a.tripId === selectedTripId);
      const tripFlights = currentFlights.filter(f => f.tripId === selectedTripId);
      const tripAccommodations = currentAccommodations.filter(a => a.tripId === selectedTripId);
      const tripTours = currentTours.filter(t => t.tripId === selectedTripId);
      const tripDayNotes = {};
      currentDayNotesRaw.filter(n => n.tripId === selectedTripId).forEach(n => { tripDayNotes[n.day] = n; });

      const totalDocs = tripActivities.length + tripFlights.length + tripAccommodations.length + tripTours.length;
      if (totalDocs === 0) {
        const overviewPanel = document.getElementById('tabPanel-overview');
        if (overviewPanel) {
          overviewPanel.innerHTML =
            '<p class="trip-empty-state">Este viaje todavía no tiene contenido.<br>Agrégalo desde el panel de administración.</p>';
        }
        return;
      }

      renderOverviewTab(tripFlights);

      const destinations = DESTINATIONS_BY_TRIP[selectedTripId];
      if (!destinations) return; // categories-mode / no breakdown yet: overview only

      const accomCityMap = ACCOM_CITY_MAP_BY_TRIP[selectedTripId] || {};
      const tourCityMap = TOUR_CITY_MAP_BY_TRIP[selectedTripId] || {};

      const grouped = {};
      tripActivities.forEach(act => { (grouped[act.day] ||= []).push(act); });

      Object.keys(destinations).forEach(cityName => {
        const panel = document.getElementById('tabPanel-' + tabSlug(cityName));
        if (!panel) return;
        panel.innerHTML = '';

        destinations[cityName].days.forEach(day => {
          if (!grouped[day]) return;
          panel.appendChild(renderDaySection(day, grouped[day], destinations, tripDayNotes));
        });

        appendCityExtras(panel, cityName, tripAccommodations, tripTours, accomCityMap, tourCityMap);
      });
    }

    // ── Categories view (viewMode "categories", e.g. Japón) ──
    function renderCategoriesView() {
      const items = currentJapanItems.filter(i => i.tripId === selectedTripId);
      // Subcat blocks always rebuild closed below, so any subcategory-level
      // photo override from before this rebuild is stale — fall back to
      // the category photo and let a fresh click re-apply it if needed.
      activeSubcatPhoto = null;
      JAPAN_CATEGORIES.forEach(category => {
        const panel = document.getElementById('tabPanel-' + tabSlug(category));
        if (!panel) return;
        panel.innerHTML = '';

        if (category === 'Tokio por Distrito') {
          panel.appendChild(renderDistrictSubTabs());
          panel.appendChild(tokioSubView === 'mapa' ? renderDistrictMap(panel) : renderDistrictSummaries());
        }

        if (category === 'Fuera de Tokio (Japón)') {
          panel.appendChild(renderRegionsSubTabs());
          if (regionsSubView === 'mapa') panel.appendChild(renderJapanMap(panel));
        }

        const allCatItems = items.filter(i => i.category === category);
        if (!allCatItems.length) {
          panel.insertAdjacentHTML('beforeend', '<p class="category-tabs-empty">Esta categoría todavía no tiene contenido.<br>Agrégalo desde el panel de administración.</p>');
          return;
        }

        panel.appendChild(renderFilterBar(category));

        const filterState = filterStateByCategory[category] || { rating: 'todos', price: 'todos' };
        const catItems = allCatItems.filter(i =>
          RATING_TIERS[filterState.rating](i.rating) && PRICE_TIERS[filterState.price](i.priceTier)
        );
        if (!catItems.length) {
          panel.insertAdjacentHTML('beforeend', '<p class="category-tabs-empty">Ningún elemento coincide con estos filtros.</p>');
          return;
        }

        const bySubcat = {};
        const noSubcat = [];
        catItems.forEach(item => {
          if (item.subcategory) (bySubcat[item.subcategory] ||= []).push(item);
          else noSubcat.push(item);
        });

        if (noSubcat.length) {
          const wrap = document.createElement('div');
          wrap.className = 'japan-subcat-items';
          wrap.style.marginBottom = 'var(--space-4)';
          sortByPriority(noSubcat).forEach(item => wrap.appendChild(renderJapanItemCard(item)));
          panel.appendChild(wrap);
        }

        const order = JAPAN_SUBCATEGORY_ORDER[category];
        const subcatKeys = Object.keys(bySubcat).sort((a, b) => {
          if (!order) return a.localeCompare(b);
          const ia = order.indexOf(a), ib = order.indexOf(b);
          if (ia === -1 && ib === -1) return a.localeCompare(b);
          if (ia === -1) return 1;
          if (ib === -1) return -1;
          return ia - ib;
        });
        subcatKeys.forEach(subcat => panel.appendChild(renderSubcatBlock(subcat, bySubcat[subcat])));
      });
      updateViewHero();
    }

    // Lower priority number = shown first; items without a priority sort last (by title).
    function sortByPriority(items) {
      return items.sort((a, b) => {
        const pa = a.priority ?? Infinity, pb = b.priority ?? Infinity;
        if (pa !== pb) return pa - pb;
        return a.title.localeCompare(b.title);
      });
    }

    function renderFilterBar(category) {
      const state = filterStateByCategory[category] ||= { rating: 'todos', price: 'todos' };
      const bar = document.createElement('div');
      bar.className = 'japan-filter-bar';

      function chipGroup(icon, options, currentKey, onPick) {
        const group = document.createElement('div');
        group.className = 'japan-filter-group';
        const label = document.createElement('span');
        label.className = 'japan-filter-icon';
        label.textContent = icon;
        group.appendChild(label);
        options.forEach(([key, text]) => {
          const isActive = currentKey === key;
          const chip = document.createElement('button');
          chip.type = 'button';
          chip.className = 'japan-filter-chip' + (isActive ? ' is-active' : '');
          chip.textContent = (isActive ? '✓ ' : '') + text;
          chip.addEventListener('click', () => {
            if (currentKey === key) return;
            onPick(key);
            renderCategoriesView();
          });
          group.appendChild(chip);
        });
        return group;
      }

      bar.appendChild(chipGroup('⭐', [
        ['todos', 'Todos'], ['alto', 'Alto 4-5★'], ['medio', 'Medio 3-4★'], ['bajo', 'Bajo 1-2★']
      ], state.rating, (key) => { state.rating = key; }));

      bar.appendChild(chipGroup('💰', [
        ['todos', 'Todos'], ['eco', '¥ Económico'], ['medio', '¥¥ Medio'], ['caro', '¥¥¥ Caro']
      ], state.price, (key) => { state.price = key; }));

      return bar;
    }

    function renderDistrictSubTabs() {
      const bar = document.createElement('div');
      bar.className = 'tokio-subtabs';
      [['resumen', '📋 Resumen'], ['mapa', '🗺️ Mapa']].forEach(([key, label]) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'tokio-subtab-btn' + (tokioSubView === key ? ' active' : '');
        btn.textContent = label;
        btn.addEventListener('click', () => {
          if (tokioSubView === key) return;
          tokioSubView = key;
          renderCategoriesView();
        });
        bar.appendChild(btn);
      });
      return bar;
    }

    // Shared tap-to-callout behavior for the Tokyo/Japan illustrated maps —
    // tapping a shape shows a small popup anchored near it (emoji + name +
    // teaser + "Ver más" button) as a FIXED bottom sheet over a backdrop —
    // anchored to the viewport, never to the tapped shape's position. The
    // map wrap can be much taller than the screen (tall scrollable SVG),
    // so a sheet positioned relative to the shape could render far outside
    // the visible viewport; fixed-to-viewport is the only placement that's
    // guaranteed visible regardless of which shape was tapped or how far
    // the page is scrolled.
    // `rectsByName`: { name -> {x,y,w,h} } in the SVG's own viewBox units
    // (kept for API compatibility; no longer used for positioning).
    // `getInfo(name)`: returns {emoji, title, teaser, badge?, noNav?} or null.
    // `onVerMas(name)`: called when the sheet's "Ver más" button is tapped.
    function attachMapCallouts(wrap, viewBoxW, viewBoxH, rectsByName, getInfo, onVerMas) {
      function showSheet(name) {
        const info = getInfo(name);
        if (!info) return;
        const backdrop = document.getElementById('mapSheetBackdrop');
        const sheet = document.getElementById('mapSheet');
        document.getElementById('mapSheetBody').innerHTML =
          `<div class="map-sheet-title">${info.emoji} ${escHtml(info.title)}${info.badge ? ` <span class="map-callout-badge">${escHtml(info.badge)}</span>` : ''}</div>` +
          `<div class="map-sheet-teaser">${escHtml(info.teaser)}</div>` +
          (info.noNav ? '' : `<button type="button" class="map-sheet-btn" id="mapSheetVerMas">Ver más →</button>`);
        const verMasBtn = document.getElementById('mapSheetVerMas');
        if (verMasBtn) {
          verMasBtn.addEventListener('click', () => { dismissMapSheet(); onVerMas(name); });
        }
        backdrop.classList.add('open');
        sheet.classList.add('open');
      }

      wrap.querySelectorAll('.tokio-map-shape, .tokio-map-pin').forEach(shape => {
        const name = shape.dataset.subcat || shape.dataset.region || shape.dataset.pin;
        shape.addEventListener('click', (e) => { e.stopPropagation(); showSheet(name); });
        shape.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); e.stopPropagation(); showSheet(name); }
        });
      });
    }

    function dismissMapSheet() {
      document.getElementById('mapSheetBackdrop')?.classList.remove('open');
      document.getElementById('mapSheet')?.classList.remove('open');
    }

    function renderDistrictMap(panel) {
      const wrap = document.createElement('div');
      wrap.className = 'tokio-map-wrap';

      const summaryByName = {};
      TOKYO_DISTRICT_SUMMARIES.forEach(d => { summaryByName[d.name] = d; });

      const shapesHtml = TOKIO_MAP_SHAPES.map(s => {
        const cx = s.x + s.w / 2, cy = s.y + s.h / 2;
        const d = summaryByName[s.name];
        return `
          <g class="tokio-map-shape" data-subcat="${escHtml(s.name)}" tabindex="0" role="button" aria-label="${escHtml(s.name)}">
            <rect x="${s.x}" y="${s.y}" width="${s.w}" height="${s.h}" rx="14" fill="${TOKIO_MAP_COLORS[s.name] || '#E5E7EB'}" stroke="#fff" stroke-width="2"></rect>
            <text x="${cx}" y="${cy - 5}" text-anchor="middle" class="tokio-map-emoji">${d ? d.emoji : ''}</text>
            <text x="${cx}" y="${cy + 15}" text-anchor="middle" class="tokio-map-label">${escHtml(s.name)}</text>
          </g>`;
      }).join('');

      wrap.innerHTML =
        `<svg class="tokio-map-svg" viewBox="0 0 560 620" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Mapa ilustrado de Tokio por distrito">` +
          `<rect x="5" y="5" width="535" height="500" rx="46" fill="#FAF3E8"></rect>` +
          `<path d="M370 330 Q460 330 540 395 L560 620 L340 620 Q325 470 370 330 Z" fill="#BFDBFE"></path>` +
          shapesHtml +

    async function toggleJapanItemDone(id) {
      const item = currentJapanItems.find(i => i.id === id);
      if (!item) return;
      const newDone = !item.done;
      item.done = newDone;

      const cardEl = document.querySelector(`.japan-item-card[data-id="${id}"]`);
      if (cardEl) {
        cardEl.classList.toggle('is-done', newDone);
        const btn = cardEl.querySelector('.visto-toggle-btn');
        if (btn) {
          btn.classList.toggle('is-done', newDone);
          btn.innerHTML = newDone ? '↩' : '✓ Visto';
        }

      try {
        await updateDoc(doc(db, 'japanItems', id), { done: newDone });

        console.error('Error updating japanItem done state:', err);
        item.done = !newDone;

      const mapsIcon = act.mapsUrl ? '<span class="card-icon" title="Ver en mapa">📍</span>' : '';
      const contactIcon = act.contacto?.contactPhone ? '<span class="card-icon" title="Contacto disponible">📞</span>' : '';
      const doneIcon = act.done    ? '<span class="done-badge" title="Hecho">✓</span>' : '';

      card.innerHTML =
        `<div class="card-left-accent accent-${act.type}"></div>` +
        `<div class="card-inner">` +
          `<div class="card-time-col">` +

    // ── Modal ───────────────────────────────────────────────
    const overlay = document.getElementById('modalOverlay');

    function openModal(id) {
      const act = currentActivities.find(a => a.id === id);
      if (!act) return;
      currentOpenId = id;

      document.getElementById('modalTypeBadge').innerHTML =
        `<span class="type-badge badge-${act.type}">${TYPE_LABELS[act.type] || act.type}</span>` +
        (act.isSuggestion ? `<span class="suggestion-badge">💡 Sugerencia</span>` : '');
      document.getElementById('modalTitle').textContent = act.title;

      const parts = [];
      if (act.time) parts.push(act.time + 'h');
      if (act.city) parts.push(act.city);
      document.getElementById('modalTimecity').innerHTML =
        parts.map((p, i) => (i > 0 ? '<span class="divider"></span>' : '') + escHtml(p)).join('');

      document.getElementById('modalDescription').innerHTML = fmtDesc(act.description || '');

      buildModalFooter(act);

      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
      setTimeout(() => document.getElementById('modalClose').focus(), 50);
    }

    function buildModalFooter(act) {
      const footer = document.getElementById('modalFooter');
      footer.innerHTML = '';

      const doneBtn = document.createElement('button');
      doneBtn.className = 'btn-done-toggle' + (act.done ? ' is-done' : '');
      doneBtn.id = 'modalDoneBtn';
      doneBtn.innerHTML = act.done ? '↩ Marcar como pendiente' : '✓ Marcar como hecho';
      doneBtn.addEventListener('click', () => toggleDone(act.id));
      footer.appendChild(doneBtn);

      if (act.mapsUrl || act.pdfUrl || act.contacto?.contactName) {
        const sep = document.createElement('div');
        sep.className = 'modal-footer-sep';
        footer.appendChild(sep);
      }

      if (act.mapsUrl) {
        const a = document.createElement('a');
        a.className = 'btn btn-maps';
        a.href = act.mapsUrl;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.innerHTML = '📍 Ver en Google Maps';
        footer.appendChild(a);
      }

      if (act.pdfUrl) {
        const a = document.createElement('a');
        a.className = 'btn btn-pdf';
        a.href = act.pdfUrl;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.innerHTML = '📄 Ver documento';
        footer.appendChild(a);
      }

      if (act.contacto?.contactName) {
        const wrap = document.createElement('div');
        wrap.style.flex = '0 0 100%';
        wrap.appendChild(contactElement(act.contacto));
        footer.appendChild(wrap);
      }
    }

    function refreshModalDoneBtn(act) {
      const btn = document.getElementById('modalDoneBtn');
      if (!btn) return;
      btn.className = 'btn-done-toggle' + (act.done ? ' is-done' : '');
      btn.innerHTML = act.done ? '↩ Marcar como pendiente' : '✓ Marcar como hecho';
    }

    function closeModal() {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
      currentOpenId = null;
    }

    document.getElementById('modalClose').addEventListener('click', closeModal);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    // ── Toggle done ─────────────────────────────────────────
    async function toggleDone(id) {
      const act = currentActivities.find(a => a.id === id);
      if (!act) return;
      const newDone = !act.done;
      act.done = newDone;

      const cardEl = document.querySelector(`.activity-card[data-id="${id}"]`);
      if (cardEl) {
        cardEl.classList.toggle('is-done', newDone);
        const titleEl = cardEl.querySelector('.card-title');
        if (titleEl) titleEl.style.textDecoration = newDone ? 'line-through' : '';
        const iconsEl = cardEl.querySelector('.card-icons');
        if (iconsEl) {
          const existingBadge = iconsEl.querySelector('.done-badge');
          if (newDone && !existingBadge) {
            const badge = document.createElement('span');
            badge.className = 'done-badge';
            badge.title = 'Hecho';
            badge.textContent = '✓';
            iconsEl.insertBefore(badge, iconsEl.querySelector('.card-arrow'));
          } else if (!newDone && existingBadge) {
            existingBadge.remove();
          }
        }
      }

      refreshModalDoneBtn(act);

      try {
        await updateDoc(doc(db, 'activities', id), { done: newDone });
      } catch (err) {
        console.error('Error updating done state:', err);
        act.done = !newDone;
        if (cardEl) cardEl.classList.toggle('is-done', !newDone);
        refreshModalDoneBtn(act);
      }
    }

    // ── Status pill helper (flights / accommodations / tours) ──
    function statusPillClass(status) {
      const s = String(status || '').toLowerCase();
      if (s.startsWith('confirmed')) return 'status-confirmed';
      if (s.startsWith('pending') || s.includes('awaiting')) return 'status-pending';
      return 'status-default';
    }

    // ── Contact / WhatsApp element ───────────────────────────
    function contactElement(contacto) {
      if (contacto.contactPhone) {
        const digits = contacto.contactPhone.replace(/[^0-9]/g, '');
        const a = document.createElement('a');
        a.className = 'contact-link';
        a.href = `https://wa.me/${digits}`;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.innerHTML = `📞 ${escHtml(contacto.contactName || 'Contacto')} · WhatsApp`;
        return a;
      }
      const span = document.createElement('span');
      span.className = 'contact-name-only';
      span.innerHTML = `📞 ${escHtml(contacto.contactName)}`;
      return span;
    }

            `<span class="flight-card-city">${escHtml(f.from?.city || f.from?.code || '?')}</span>` +
            `<span class="flight-card-arrow">✈ →</span>` +
            `<span class="flight-card-city">${escHtml(f.to?.city || f.to?.code || '?')}</span>` +
          `</div>` +
          `<div class="flight-card-meta">` +
            `<span><strong>${escHtml(f.departureDate || '')}</strong> ${escHtml(f.departureTime || '')}</span>` +
            (f.airline ? `<span>${escHtml(f.airline)}${f.flightNumber ? ' · ' + escHtml(f.flightNumber) : ''}</span>` : '') +
            (f.duration ? `<span>${escHtml(f.duration)}</span>` : '') +
          `</div>` +
          `<div class="flight-card-footer">` +
            `<span class="status-pill ${statusPillClass(f.status)}">${escHtml(f.status || '')}</span>` +
            pdf +
          `</div>`;
        list.appendChild(card);
      });
    }

    // ── Render: Accommodations ───────────────────────────────
    function renderAccommodations(items, list) {
      if (!list) return;
      list.innerHTML = '';
      items.forEach(a => {
        const card = document.createElement('div');
        card.className = 'accom-card';
        const dates = [a.checkInDate, a.checkOutDate].filter(Boolean).join(' → ');
        const cost = a.cost === 0 ? 'Sin costo' : (a.cost != null ? `${a.cost} ${escHtml(a.costCurrency || '')}` : '');
        const pdf = a.pdfUrl
          ? `<a class="overview-pdf-link" href="${escHtml(a.pdfUrl)}" target="_blank" rel="noopener noreferrer">📄 Comprobante</a>`
          : '';
        const maps = a.mapsUrl
          ? `<a class="overview-pdf-link" href="${escHtml(a.mapsUrl)}" target="_blank" rel="noopener noreferrer">📍 Ver en Maps</a>`
          : '';
        card.innerHTML =
          `<div class="accom-card-name">${escHtml(a.name)}</div>` +
          (a.region ? `<div class="accom-card-region">${escHtml(a.region)}</div>` : '') +
          (a.note ? `<div class="accom-card-note">${escHtml(a.note)}</div>` : '') +
          `<div class="accom-card-meta">` +
            (dates ? `<span>${escHtml(dates)}</span>` : '') +
            (cost ? `<span>${escHtml(cost)}</span>` : '') +
            `<span class="status-pill ${statusPillClass(a.status)}">${escHtml(a.status || '')}</span>` +
            maps + pdf +
          `</div>`;
        if (a.contacto?.contactName) {
          const contactWrap = document.createElement('div');
          contactWrap.style.marginTop = '8px';
          contactWrap.appendChild(contactElement(a.contacto));
          card.appendChild(contactWrap);
        }
        list.appendChild(card);
      });
    }

    // ── Render: Tours ─────────────────────────────────────────
    function renderTours(items, list) {
      if (!list) return;
      list.innerHTML = '';
      items.forEach(t => {
        const card = document.createElement('div');
        card.className = 'tour-card';
        const dateLabel = t.date || [t.startDate, t.endDate].filter(Boolean).join(' → ') || '';
        const pdf = t.pdfUrl
          ? `<a class="overview-pdf-link" href="${escHtml(t.pdfUrl)}" target="_blank" rel="noopener noreferrer">📄 Comprobante</a>`
          : '';
        const maps = t.mapsUrl
          ? `<a class="overview-pdf-link" href="${escHtml(t.mapsUrl)}" target="_blank" rel="noopener noreferrer">📍 Ver en Maps</a>`
          : '';

        let itineraryHtml = '';
        if (Array.isArray(t.customItinerary) || Array.isArray(t.itinerary)) {
          const rows = t.customItinerary || t.itinerary;
          itineraryHtml = '<div class="tour-itinerary">' +
            rows.map(r =>
              `<div class="tour-itinerary-row">` +
                `<span class="tour-itinerary-time">${escHtml(r.time || '')}</span>` +
                `<span class="tour-itinerary-activity">${escHtml(r.activity || '')}</span>` +
              `</div>`
            ).join('') +
            '</div>';
        } else if (Array.isArray(t.itineraryByDay)) {
          itineraryHtml = '<div class="tour-itinerary">' +
            t.itineraryByDay.map(d =>
              `<div class="tour-day-label">Día ${escHtml(d.day)}${d.date ? ' · ' + escHtml(d.date) : ''}</div>` +
              (d.spots || []).map(spot =>
                `<div class="tour-itinerary-row"><span class="tour-itinerary-activity">• ${escHtml(spot)}</span></div>`
              ).join('')
            ).join('') +
            '</div>';
        }

        card.innerHTML =
          `<div class="tour-card-name">${escHtml(t.name)}</div>` +
          (t.operator ? `<div class="tour-card-operator">${escHtml(t.operator)}</div>` : '') +
          `<div class="tour-card-meta">` +
            (dateLabel ? `<span>${escHtml(dateLabel)}</span>` : '') +
            (t.duration ? `<span>${escHtml(t.duration)}</span>` : '') +
            `<span class="status-pill ${statusPillClass(t.status)}">${escHtml(t.status || '')}</span>` +
            maps + pdf +
          `</div>` +
          itineraryHtml;

        if (t.contacto?.contactName) {
          const contactWrap = document.createElement('div');
          contactWrap.style.marginTop = '10px';
          contactWrap.appendChild(contactElement(t.contacto));
          card.appendChild(contactWrap);
        }

        list.appendChild(card);
      });
    }

    // ── Helpers ─────────────────────────────────────────────
    function escHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function fmtDesc(text) {
      return text.split('\n\n').map(para =>
        '<p>' + escHtml(para).replace(/\n/g, '<br>') + '</p>'
      ).join('');
    }
  </script>

</body>
</html>
